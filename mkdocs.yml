site_name: Anti-gravity Doc System
site_url: https://krjoylee.github.io/mydoc/
site_description: Anti-gravity 문서 중심 시스템 — 원본 동기화 & Steve 마킹 보존
site_author: Steve (Joy)

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github
  custom_dir: overrides

plugins:
  - search:
      lang:
        - ko
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 🏠 홈(Home): index.md
  - 📖 시작 가이드(Getting Started): getting-started.md
  - 📚 Antigravity Docs:
    - Home: antigravity/home.md
  - 📋 프로젝트 관리(Project):
    - 명세서(Spec): SPEC.md
    - 실행 계획(Plan): PLAN.md
    - TODO: TODO.md
    - 테스트 계획(Test): TEST_PLAN.md
    - 변경 로그(Changelog): CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/krjoylee/mydoc

extra_css:
  - assets/stylesheets/custom.css

copyright: Copyright &copy; 2026 Steve (Joy) — Anti-gravity Doc System
